services:
  postgres:
    image: postgres:15
    container_name: graduation_thesis_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-graduation_thesis_ver2}
      POSTGRES_USER: ${POSTGRES_USER:-doanhung}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: graduation_thesis_keycloak
    command: start-dev --import-realm --features=scripts
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:?KEYCLOAK_ADMIN is required}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-graduation_thesis_ver2}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-doanhung}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:?KC_DB_PASSWORD is required}
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "9000:8080"
    volumes:
      - ./src/main/resources/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      - postgres
    restart: unless-stopped

  backend:
    image: ghcr.io/nguyenvanhung1707/do-an/backend:latest
    container_name: graduation_thesis_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-graduation_thesis_ver2}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-doanhung}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-hung2004}/protocol/openid-connect/certs
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-hung2004}
      KEYCLOAK_URLS_AUTH: http://keycloak:8080
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-graduation_thesis_ver2}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN:?KEYCLOAK_ADMIN is required}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      APP_BOOTSTRAP_ADMIN_ENABLED: ${APP_BOOTSTRAP_ADMIN_ENABLED:-false}
      APP_BOOTSTRAP_ADMIN_USERNAME: ${APP_BOOTSTRAP_ADMIN_USERNAME:-admin}
      APP_BOOTSTRAP_ADMIN_EMAIL: ${APP_BOOTSTRAP_ADMIN_EMAIL:-admin_system@example.com}
      APP_BOOTSTRAP_ADMIN_FIRST_NAME: ${APP_BOOTSTRAP_ADMIN_FIRST_NAME:-System}
      APP_BOOTSTRAP_ADMIN_LAST_NAME: ${APP_BOOTSTRAP_ADMIN_LAST_NAME:-Admin}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${APP_BOOTSTRAP_ADMIN_PASSWORD:-}
      APP_UPLOAD_DIR: /app/data/student_faces
      APP_DOCUMENT_DIR: /app/data/document
      APP_AI_PROCTOR_URL: http://ai_proctor:8000
      APP_FACE_VERIFICATION_URL: http://detect_face:8888/attendance
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ${DATA_PATH:-./data}:/app/data
    depends_on:
      - postgres
      - keycloak
    restart: unless-stopped

  detect_face:
    image: ghcr.io/nguyenvanhung1707/do-an/detect-face:latest
    container_name: graduation_thesis_detect_face
    ports:
      - "8888:8888"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-doanhung}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_NAME: ${POSTGRES_DB:-graduation_thesis_ver2}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ${DATA_PATH:-./data}:/app/data
    depends_on:
      - postgres
    restart: unless-stopped

  fe_web:
    image: ghcr.io/nguyenvanhung1707/do-an/fe-web:latest
    container_name: graduation_thesis_fe_web
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  ai_proctor:
    image: ghcr.io/nguyenvanhung1707/do-an/ai-proctor:latest
    container_name: graduation_thesis_ai_proctor
    ports:
      - "8899:8000"
    environment:
      TZ: Asia/Ho_Chi_Minh
      STORAGE_ROOT: /app/data/future_ai_feature
    volumes:
      - ${DATA_PATH:-./data}:/app/data
    restart: unless-stopped

volumes:
  postgres_data:
    name: graduation_thesis_ver2_be_postgres_data
