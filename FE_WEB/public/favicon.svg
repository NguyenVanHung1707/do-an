<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#8B5CF6" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Styled Rounded background -->
  <rect x="4" y="4" width="120" height="120" rx="32" fill="url(#grad1)" filter="url(#glow)" />

  <!-- Graduation Cap (White) -->
  <!-- Diamond top -->
  <polygon points="64,28 108,46 64,64 20,46" fill="#FFFFFF" />
  <!-- Cap band -->
  <path d="M38,55 v12 c0,8 12,12 26,12 s26-4 26-12 V55" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Tassel -->
  <path d="M64,46 L30,60 V76" fill="none" stroke="#F59E0B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Tassel circle -->
  <circle cx="30" cy="78" r="4.5" fill="#F59E0B" />

  <!-- Checkmark circle badge for attendance tracking -->
  <circle cx="94" cy="94" r="22" fill="#10B981" stroke="#FFFFFF" stroke-width="4" />
  <!-- Checkmark path -->
  <path d="M85,94 L91,100 L103,88" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
</svg>