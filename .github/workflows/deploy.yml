name: Deploy to VPS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  test-and-lint:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 21 (Backend)
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Test Spring Boot Backend
        run: |
          cd backend-core
          chmod +x ./mvnw
          ./mvnw test

      - name: Set up Node.js (Frontend)
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FE_WEB/package-lock.json

      - name: Lint and Build React Web Frontend
        run: |
          cd FE_WEB
          npm ci
          npm run lint
          npm run build

      - name: Compile Python Services
        run: |
          python -m compileall -q detect-face
          python -m compileall -q ai-proctor/app

      - name: Validate Production Docker Compose
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          KC_DB_PASSWORD: ci-postgres-password
          KEYCLOAK_ADMIN: ci-keycloak-admin
          KEYCLOAK_ADMIN_PASSWORD: ci-keycloak-admin-password
          KEYCLOAK_ADMIN_CLIENT_SECRET: ci-admin-client-secret
        run: docker compose -f backend-core/docker-compose.prod.yml config


  build-images:
    name: Build and Push Docker Images
    needs: test-and-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend-core
            dockerfile: ./backend-core/Dockerfile
          - service: fe-web
            context: ./FE_WEB
            dockerfile: ./FE_WEB/Dockerfile
          - service: detect-face
            context: ./detect-face
            dockerfile: ./detect-face/Dockerfile
          - service: ai-proctor
            context: ./ai-proctor
            dockerfile: ./ai-proctor/Dockerfile
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/nguyenvanhung1707/do-an/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }},ignore-error=true

  deploy:
    name: Deploy to Production VPS
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - name: Validate Production Secrets
        env:
          PROD_POSTGRES_DB: ${{ secrets.PROD_POSTGRES_DB }}
          PROD_POSTGRES_USER: ${{ secrets.PROD_POSTGRES_USER }}
          PROD_POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          PROD_KC_DB_USERNAME: ${{ secrets.PROD_KC_DB_USERNAME }}
          PROD_KC_DB_PASSWORD: ${{ secrets.PROD_KC_DB_PASSWORD }}
          PROD_KEYCLOAK_REALM: ${{ secrets.PROD_KEYCLOAK_REALM }}
          PROD_KEYCLOAK_ADMIN: ${{ secrets.PROD_KEYCLOAK_ADMIN }}
          PROD_KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.PROD_KEYCLOAK_ADMIN_PASSWORD }}
          PROD_KEYCLOAK_ADMIN_CLIENT_ID: ${{ secrets.PROD_KEYCLOAK_ADMIN_CLIENT_ID }}
          PROD_DATA_PATH: ${{ secrets.PROD_DATA_PATH }}
        run: |
          missing=0
          for key in \
            PROD_POSTGRES_DB \
            PROD_POSTGRES_USER \
            PROD_POSTGRES_PASSWORD \
            PROD_KC_DB_USERNAME \
            PROD_KC_DB_PASSWORD \
            PROD_KEYCLOAK_REALM \
            PROD_KEYCLOAK_ADMIN \
            PROD_KEYCLOAK_ADMIN_PASSWORD \
            PROD_KEYCLOAK_ADMIN_CLIENT_ID \
            PROD_DATA_PATH
          do
            if [ -z "${!key}" ]; then
              echo "::error::$key is required for production deploy"
              missing=1
            fi
          done
          exit "$missing"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -euo pipefail

            echo "=== BẮT ĐẦU QUY TRÌNH DEPLOY CAO CẤP ==="
            
            # Di chuyển vào thư mục dự án
            cd /root/do-an || {
              echo "Thư mục /root/do-an chưa tồn tại, tiến hành clone mới..."
              git clone https://github.com/NguyenVanHung1707/do-an.git /root/do-an
              cd /root/do-an
            }

            # Cập nhật code mới nhất từ GitHub
            echo "Đang kéo mã nguồn mới nhất từ GitHub..."
            if [ -n "$(git status --porcelain)" ]; then
              echo "Detected local changes on VPS, stashing before deploy..."
              git stash push --include-untracked -m "ci-deploy-autostash-$(date -u +%Y%m%d%H%M%S)"
            fi
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # Di chuyển vào thư mục chứa Docker Compose
            cd backend-core

            # Ghi cấu hình production từ GitHub Secrets. Các secret đã lộ cần được rotate trước khi deploy.
            cat > .env.next <<'EOF'
            POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
            KC_DB_USERNAME=${{ secrets.PROD_KC_DB_USERNAME }}
            KC_DB_PASSWORD=${{ secrets.PROD_KC_DB_PASSWORD }}
            KEYCLOAK_REALM=${{ secrets.PROD_KEYCLOAK_REALM }}
            KEYCLOAK_ADMIN=${{ secrets.PROD_KEYCLOAK_ADMIN }}
            KEYCLOAK_ADMIN_PASSWORD=${{ secrets.PROD_KEYCLOAK_ADMIN_PASSWORD }}
            KEYCLOAK_ADMIN_CLIENT_ID=${{ secrets.PROD_KEYCLOAK_ADMIN_CLIENT_ID }}
            KEYCLOAK_ADMIN_CLIENT_SECRET=${{ secrets.PROD_KEYCLOAK_ADMIN_CLIENT_SECRET }}
            APP_BOOTSTRAP_ADMIN_ENABLED=${{ secrets.PROD_BOOTSTRAP_ADMIN_ENABLED }}
            APP_BOOTSTRAP_ADMIN_USERNAME=${{ secrets.PROD_BOOTSTRAP_ADMIN_USERNAME }}
            APP_BOOTSTRAP_ADMIN_EMAIL=${{ secrets.PROD_BOOTSTRAP_ADMIN_EMAIL }}
            APP_BOOTSTRAP_ADMIN_FIRST_NAME=${{ secrets.PROD_BOOTSTRAP_ADMIN_FIRST_NAME }}
            APP_BOOTSTRAP_ADMIN_LAST_NAME=${{ secrets.PROD_BOOTSTRAP_ADMIN_LAST_NAME }}
            APP_BOOTSTRAP_ADMIN_PASSWORD=${{ secrets.PROD_BOOTSTRAP_ADMIN_PASSWORD }}
            DATA_PATH=${{ secrets.PROD_DATA_PATH }}
            EOF
            sed -i 's/^[[:space:]]*//' .env.next

            for key in POSTGRES_DB POSTGRES_USER POSTGRES_PASSWORD KC_DB_USERNAME KC_DB_PASSWORD KEYCLOAK_REALM KEYCLOAK_ADMIN KEYCLOAK_ADMIN_PASSWORD KEYCLOAK_ADMIN_CLIENT_ID DATA_PATH; do
              value="$(grep -E "^${key}=" .env.next | cut -d= -f2-)"
              if [ -z "$value" ]; then
                echo "Missing required production env: $key"
                rm -f .env.next
                exit 1
              fi
            done

            mv .env.next .env
            chmod 600 .env

            echo "Kiểm tra cấu hình Docker Compose production..."
            docker compose -f docker-compose.prod.yml config >/dev/null

            # Đăng nhập vào GHCR trên VPS để pull các private packages nếu có
            echo "Đăng nhập GHCR trên VPS..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Dừng tất cả các phiên bản ứng dụng cũ (cả Dev và Prod) để tránh chạy song song 2 ứng dụng
            echo "Đang dừng tất cả các container cũ (Dev & Prod)..."
            docker compose -f docker-compose.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml down --remove-orphans || true

            # Dọn dẹp toàn bộ các container dừng, volume và image rác trước khi kéo mới để giải phóng tối đa ổ đĩa VPS
            echo "Dọn dẹp các container và images cũ để giải phóng ổ đĩa..."
            docker system prune -af --volumes || true

            # Pull các image mới nhất đã build trên GitHub Runner
            echo "Kéo các Docker images mới nhất từ GHCR..."
            docker compose -f docker-compose.prod.yml pull

            # Khởi chạy các service bằng cấu hình production
            echo "Đang cập nhật các container dịch vụ..."
            docker compose -f docker-compose.prod.yml up -d

            # Dọn dẹp các Docker image cũ/rác để tránh đầy ổ đĩa VPS
            echo "Dọn dẹp các Docker images cũ..."
            docker image prune -f

            echo "=== HOÀN TẤT DEPLOY THÀNH CÔNG ==="
