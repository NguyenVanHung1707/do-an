name: Deploy to VPS

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test-and-lint:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Backend)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Spring Boot Tests
        run: |
          cd Graduation_thesis_ver2_BE
          # Run tests and skip email check if mail sender fails in clean environment
          mvn test -Dspring.mail.host=localhost -Dspring.mail.port=25

      - name: Set up Node.js (Frontend & Mobile)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Test React Web Frontend
        run: |
          cd FE_WEB
          npm ci
          # Build check to ensure no syntax errors
          npm run build --if-present

      - name: Test Student Mobile App
        run: |
          cd frontend_student
          npm ci
          npm test

      - name: Test Teacher Mobile App
        run: |
          cd Graduation_thesis_ver2_FE_2
          npm ci
          npm test

  build-images:
    name: Build and Push Docker Images
    needs: test-and-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./Graduation_thesis_ver2_BE
            dockerfile: ./Graduation_thesis_ver2_BE/Dockerfile
          - service: fe-web
            context: ./FE_WEB
            dockerfile: ./FE_WEB/Dockerfile
          - service: detect-face
            context: ./detect-face
            dockerfile: ./detect-face/Dockerfile
          - service: ai-proctor
            context: ./ai-proctor
            dockerfile: ./ai-proctor/Dockerfile
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/nguyenvanhung1707/do-an/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production VPS
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            echo "=== BẮT ĐẦU QUY TRÌNH DEPLOY CAO CẤP ==="
            
            # Di chuyển vào thư mục dự án
            cd /root/do-an || {
              echo "Thư mục /root/do-an chưa tồn tại, tiến hành clone mới..."
              git clone https://github.com/NguyenVanHung1707/do-an.git /root/do-an
              cd /root/do-an
            }

            # Cập nhật code mới nhất từ GitHub
            echo "Đang kéo mã nguồn mới nhất từ GitHub..."
            git pull origin main

            # Di chuyển vào thư mục chứa Docker Compose
            cd Graduation_thesis_ver2_BE

            # Cấu hình biến môi trường nếu chưa có
            if [ ! -f .env ]; then
              echo "Khởi tạo file .env trên VPS..."
              echo "DATA_PATH=/root/data" > .env
            fi

            # Đăng nhập vào GHCR trên VPS để pull các private packages nếu có
            echo "Đăng nhập GHCR trên VPS..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull các image mới nhất đã build trên GitHub Runner
            echo "Kéo các Docker images mới nhất từ GHCR..."
            docker compose -f docker-compose.prod.yml pull

            # Khởi chạy các service bằng cấu hình production
            echo "Đang cập nhật các container dịch vụ..."
            docker compose -f docker-compose.prod.yml up -d

            # Dọn dẹp các Docker image cũ/rác để tránh đầy ổ đĩa VPS
            echo "Dọn dẹp các Docker images cũ..."
            docker image prune -f

            echo "=== HOÀN TẤT DEPLOY THÀNH CÔNG ==="
